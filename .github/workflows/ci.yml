name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "
          import config
          import database
          from strategies.base import Signal
          from strategies.stat_mean_reversion import StatMeanReversion
          from strategies.kalman_pairs import KalmanPairsTrader
          from strategies.micro_momentum import IntradayMicroMomentum
          from risk.vol_targeting import VolatilityTargetingRiskEngine
          from risk.daily_pnl_lock import DailyPnLLock
          from risk.beta_neutralizer import BetaNeutralizer
          from analytics.ou_tools import fit_ou_params, compute_zscore
          from analytics.hurst import hurst_exponent
          from analytics.consistency_score import compute_consistency_score
          print('All V6 imports OK')
          "

      - name: Run V6 tests
        run: |
          pytest tests/ \
            --ignore=tests/test_risk.py \
            --ignore=tests/test_strategies.py \
            --ignore=tests/test_exit_manager.py \
            --ignore=tests/test_news_filter.py \
            -v --tb=short \
            --cov=. --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t velox-v6 .
