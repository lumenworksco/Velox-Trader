# Velox V11.2 Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# T6-002: Alert rules
rule_files:
  - "alerts.yml"

# Alertmanager endpoint (configure host/port to match your deployment)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "velox"
    static_configs:
      - targets: ["velox:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
