# V10 Production Stack: Velox + PostgreSQL + Prometheus + Grafana
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f velox      # Follow trading bot logs
#   docker compose exec velox python main.py --diagnose  # Run diagnostic
#
# Endpoints:
#   http://localhost:8080       — Velox dashboard
#   http://localhost:8080/metrics — Prometheus metrics
#   http://localhost:9090       — Prometheus UI
#   http://localhost:3000       — Grafana (credentials in .env)
#   http://localhost:9093       — Alertmanager UI

services:
  velox:
    build: .
    container_name: velox-v11
    restart: unless-stopped
    stop_grace_period: 45s
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-velox}:${POSTGRES_PASSWORD:-velox}@postgres:5432/${POSTGRES_DB:-velox}
      - STRUCTURED_LOGGING=true
      - WEB_DASHBOARD_PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./bot.db:/app/bot.db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  postgres:
    image: postgres:16-alpine
    container_name: velox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-velox}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velox"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: velox-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    depends_on:
      - velox
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # T6-002: Alertmanager — routes Prometheus alerts to Telegram/email
  alertmanager:
    image: prom/alertmanager:latest
    container_name: velox-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertdata:/alertmanager
    env_file: .env
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    container_name: velox-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafdata:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  pgdata:
  promdata:
  grafdata:
  alertdata:
